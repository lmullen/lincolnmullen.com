{{ $posts := first 5 (where (where .Site.RegularPages "Section" "blog") ".Title" "!=" "") }}

<ul class="list-unstyled mb-3">
	{{ range $posts }}
	<li class="py-2">
		<a href="{{ .Permalink }}" class="fw-semibold text-decoration-none">{{ .Title | markdownify }}</a>
		<small class="text-body-secondary ms-2 text-nowrap">{{ .Date.Format "2 January 2006" }}</small>
		{{ with .Description }}<br><small class="text-body-secondary">{{ . | markdownify }}</small>{{ end }}
	</li>
	{{ end }}
</ul>
